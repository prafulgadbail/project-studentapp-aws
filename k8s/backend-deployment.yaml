apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app-backend
  namespace: student-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: student-app-backend

  template:
    metadata:
      labels:
        app: student-app-backend

    spec:
      containers:
        - name: backend
          image: 620448465315.dkr.ecr.ap-south-1.amazonaws.com/student-app-backend:latest
          ports:
            - containerPort: 8080

          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: student-app-configmap
                  key: DB_URL

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: student-app-configmap
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: student-app-configmap
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: student-app-db-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-app-db-secret
                  key: DB_PASSWORD

